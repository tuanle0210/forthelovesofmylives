<script>
    const tracks = [
      { title: "01. Intro", src: "https://files.catbox.moe/xgd20m.mp3" },
      { title: "02. Be Free", src: "https://files.catbox.moe/1ck0gu.mp3" },
      { title: "03. Mèo Đi Heels", src: "https://files.catbox.moe/hye3vk.mp3" },
      { title: "04. A Tension Lover", src: "https://files.catbox.moe/1ucp53.mp3" }
    ];

    const player = document.getElementById('audioPlayer');
    let currentTrack = 0;

    // Render tracklist
    const trackList = document.getElementById('tracks');
    tracks.forEach((track, index) => {
      const div = document.createElement('div');
      div.className = 'track';
      div.innerHTML = `<span>${track.title}</span><span class="track-duration">3:45</span>`;
      div.onclick = () => playTrack(index);
      trackList.appendChild(div);
    });

    function playTrack(index) {
      currentTrack = index;
      player.src = tracks[index].src;
      player.play().catch(e => console.log("Play error:", e));
      
      document.querySelectorAll('.track').forEach((el, i) => {
        el.classList.toggle('playing', i === index);
      });
    }

    function togglePlay() {
      if (player.paused) {
        player.play();
        document.getElementById('playPauseBtn').textContent = '❚❚';
      } else {
        player.pause();
        document.getElementById('playPauseBtn').textContent = '▶';
      }
    }

    function nextTrack() { currentTrack = (currentTrack + 1) % tracks.length; playTrack(currentTrack); }
    function prevTrack() { currentTrack = (currentTrack - 1 + tracks.length) % tracks.length; playTrack(currentTrack); }

    player.addEventListener('ended', nextTrack);

    // Khởi tạo
    window.onload = () => {
      document.getElementById('playPauseBtn').textContent = '▶';
    };
  </script>
