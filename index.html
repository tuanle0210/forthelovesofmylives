<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For the Loves of My Lives</title>
  <style>
    :root {
      --bg-color: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9));
      --accent-rgb: 255, 77, 148;
      --accent: rgb(var(--accent-rgb));
      --text: #ffffff;
      --card: rgba(0,0,0,0.55);
    }
    [data-theme="light"] {
      --bg-color: linear-gradient(rgba(255,230,240,0.95), rgba(255,200,220,0.98));
      --text: #2d0a1f;
      --card: rgba(255,255,255,0.9);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      color: var(--text);
      min-height: 100vh;
      text-align: center;
      background: var(--bg-color),
                  url('https://i.ibb.co/ccfxb6yZ/Gemini-Generated-Image-ydb0ysydb0ysydb0-s-a.png') center/cover no-repeat fixed;
      transition: background 0.5s;
      padding-bottom: 90px; /* chừa chỗ cho mini-player */
    }
    .container { max-width: 460px; margin: 0 auto; padding: 20px 15px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .theme-toggle {
      background: rgba(0,0,0,0.3);
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 1.4em;
      cursor: pointer;
      color: white;
    }
    [data-theme="light"] .theme-toggle { background: rgba(255,255,255,0.7); color: #2d0a1f; }

    img#albumArt {
      width: 100%;
      max-width: 340px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      margin: 15px 0;
      transition: transform 0.6s ease;
    }

    .custom-controls {
      background: var(--card);
      padding: 18px;
      border-radius: 20px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    canvas#visualizer { width: 100%; height: 70px; margin: 10px 0; border-radius: 12px; background: rgba(0,0,0,0.4); }
    .progress-container, .volume-container { margin: 12px 0; }
    progress, input[type="range"] { width: 100%; accent-color: var(--accent); }
    .buttons { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
    button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: var(--text);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 1.5em;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: scale(1.1); }
    #playPauseBtn { background: var(--accent); width: 68px; height: 68px; font-size: 1.8em; }

    /* Shuffle & Repeat */
    .mode-btn { width: 44px; height: 44px; font-size: 1.15em; position: relative; }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .mode-btn .repeat-one-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      font-size: 0.32em;
      background: #fff;
      color: var(--accent);
      border-radius: 50%;
      width: 15px;
      height: 15px;
      line-height: 15px;
      font-weight: bold;
    }

    .tracklist, .lyrics {
      background: var(--card);
      border-radius: 20px;
      padding: 18px;
      margin-top: 20px;
      text-align: left;
    }
    .track {
      padding: 14px;
      cursor: pointer;
      border-radius: 12px;
      margin: 6px 0;
      transition: 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .track:hover, .track.playing { background: rgba(var(--accent-rgb), 0.4); }
    .track-duration { font-size: 0.85em; opacity: 0.7; }

    .lyrics { min-height: 220px; line-height: 1.75; white-space: pre-line; transition: opacity 0.4s ease; font-size: 0.96em; }

    .footer { margin-top: 40px; padding: 20px; font-size: 0.9em; opacity: 0.85; }
    .social-links a { color: var(--text); font-size: 1.6em; margin: 0 12px; transition: 0.3s; }
    .social-links a:hover { color: var(--accent); transform: translateY(-3px); }

    .error-msg {
      display: none;
      background: rgba(255,60,60,0.25);
      border: 1px solid rgba(255,60,60,0.6);
      border-radius: 12px;
      padding: 10px 14px;
      margin: 10px 0;
      font-size: 0.85em;
    }

    /* Sticky mini-player */
    .mini-player {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      box-shadow: 0 -6px 20px rgba(0,0,0,0.4);
      transform: translateY(110%);
      transition: transform 0.35s ease;
      z-index: 999;
    }
    .mini-player.show { transform: translateY(0); }
    .mini-player img {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .mini-info {
      flex: 1;
      text-align: left;
      overflow: hidden;
    }
    .mini-info .mini-title {
      font-size: 0.9em;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-progress {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .mini-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s linear;
    }
    .mini-player button {
      width: 42px;
      height: 42px;
      font-size: 1.2em;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body data-theme="dark">
  <div class="container">
    <div class="header">
      <div></div>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
    </div>

    <img id="albumArt" crossorigin="anonymous" src="https://i.ibb.co/Xx8J3Rcs/Page-1-Front-Cover.png" alt="Album Cover">
    <h1>For the Loves of My Lives</h1>
    <p>Tuan Le</p>

 <div class="custom-controls" id="customControls">
  <audio id="audioPlayer" crossorigin="anonymous"></audio>
  <canvas id="visualizer"></canvas>

  <div class="error-msg" id="errorMsg">⚠️ Không tải được bài hát, vui lòng thử lại.</div>

  <div class="progress-container">

  <div class="buttons">

  </div>

  <div class="volume-container">
    <div class="volume-label">
      <span>🔊</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
</div>

    <div class="tracklist">
      <h2>Tracklist</h2>
      <div id="tracks"></div>
    </div>

    <div class="lyrics" id="lyricsDisplay">
      Chọn một bài hát để xem lời...
    </div>

    <div class="footer">
      <p><strong>Tuan Le</strong> • For the Loves of My Lives</p>
      <div class="social-links">
        <a href="https://facebook.com/tuanleftu" target="_blank">📘</a>
        <a href="https://instagram.com/tbob.ins" target="_blank">📷</a>
      </div>
      <p style="margin-top: 15px; font-size: 0.8em;">© 2026 Tuan Le</p>
    </div>
  </div>

  <!-- Sticky mini-player -->
  <div class="mini-player" id="miniPlayer">
    <img id="miniArt" src="https://i.ibb.co/Xx8J3Rcs/Page-1-Front-Cover.png" alt="Mini cover">
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">01. Intro</div>
      <div class="mini-progress"><div class="mini-progress-fill" id="miniProgressFill"></div></div>
    </div>
    <button id="miniPlayBtn" onclick="togglePlay()">▶</button>
  </div>

  <script>
    const BASE = "https://cdn.jsdelivr.net/gh/tuanle0210/album-audio@main/";

    const tracks = [
      { title: "01. Intro", src: BASE + "01%20INTRO_MASTER_MP3_320.mp3", lyrics: "(Instrumental)", duration: "1:12" },
      { title: "02. Be Free", src: BASE + "02%20BE%20FREE_MASTER_MP3_320%20(1).mp3", lyrics: "You, you, you\nYou, you, you\nYou, you, you\nYou so pretty baby\n\nYou, you, you\nYou, you, you\nYou, you, you\nStuck inside my head\n\nOh Anna\nPick up the phone\nSay something clever\nI’m heading to your place, no pressure\n\nLet’s get far away\n‘Cause I don’t know how to shake this fever\nOnly your love can make me stronger\n\nLift me up, but don’t let me down\nTake my hands, don’t let them drown, just stay\n\nI’m going faster while I’m getting higher\nFeeling nauseous when the pills kicked in\n\nTell me, baby, are you free this Saturday night?\nGive me all you’ve got so I can stop thinking of you, oh baby\n\nYou, you, you\nYou, you, you\nYou, you, you\nYou so pretty baby\n\nYou, you, you\nYou, you, you\nYou, you, you\nStuck inside my head\n\nOh Anna\nOh oh I did it again\nI crossed the line that we can’t define and\n\nI know that you wanna take it slow\nbut I’m burning just to know how to make you feel and fall in love\n\nPromise that I will do it nonstop so just let me prove it\nI wanna make it clear so just quit fucking around\n\nGod I’m still falling into all these mixed feelings\nGuess I love the way you keep me guessing\n\nTell me, baby, are you free this Sunday morning?\nGive me all you’ve got so I can stop thinking of you, oh baby\n\n‘Cause I just want your love\nEvery inch of your skin, every breath that you take\nJust give it all to me\nAnd then let your mind be free", duration: "3:45" },
      { title: "03. Mèo Đi Heels", src: BASE + "03%20MEO%20DI%20HEELS_MASTER_MP3_320%20(2).mp3", lyrics: "Ngày ngủ còn đêm chơi\nAi biết đâu được em phiêu du đây đó\nChẳng cần một ai đâu\nVì em luôn biết rằng em thật quý giá\n\nEm như là hoa ở trên cành\nBao nhiêu người thương cũng chẳng đành\nVì mai nay lỡ rồi em đi mất\n\nTôi mang thầm thương viết cho em\nĐêm đêm ngồi ca hát bên thềm\nDù cho tôi biết chẳng thể nào mà có em\n\nCho dù em biết anh yêu em nhưng thôi em vẫn cứ lặng thinh\nBao chuyện cỏn con, phai nhạt màu son, lem hết mi\n\nYêu thì yêu không yêu thì thôi dù sao cũng cách xa\nLỡ mai em đi về xa vời, có chăng đây chỉ còn lại mình anh?\n\nOkay em ơi nghe anh nói này\nCho anh một cơ hội để anh được giãi bày\n\nAnh biết em biết là anh không ý kiến\nNhưng mà xinh như thế sao em không có duyên?\n\nCứ quăng miếng chán chê rồi em đi mất\nAnh cứ ngồi trông ngóng cứ nghĩ em nói thật\n\nVài ba hôm quay lại em nói em nhớ anh nhất\nCơ mà sao anh vẫn tin em như thằng đần?\n\nHay tại em chỉ yêu người ít nói\nKhông cần nhiều lời chẳng cần thanh minh\n\nMỗi khi em buồn khi em giận dỗi\nLời xin lỗi họ gửi qua tin nhắn banking\n\nTin nhắn anh gửi em chưa bấm xem\nEm up thread hỏi bao nhiêu người đang nhớ em\n\nTình yêu không phải thế đâu em ơi\nĐây không phải gameshow Hiếu Thứ Hai còn lười chơi\n\nNgày ngủ bù cho đêm\nTôi vẫn cứ ngây dại đi theo em như thế\nDù biết em sẽ chẳng hề bận tâm\nNhưng sao tôi vẫn ấp ôm một mối tình\n\nBiết đâu em như là hoa ở trên cành\nBao nhiêu người thương cũng chẳng đành\nRồi buổi chiều hôm ấy chợt em đi mất\n\nTôi mang thầm thương viết cho em\nEm chưa đọc xong vứt quanh nhà\nVì em cũng biết tôi chẳng thể nào mà có em\n\nCho dù em biết anh yêu em nhưng thôi em vẫn cứ lặng thinh\nBao chuyện cỏn con, phai nhạt màu son, lem hết mi\n\nYêu thì yêu không yêu thì thôi dù sao cũng cách xa\nLỡ mai em đi về xa vời, có chăng đây chỉ còn lại mình anh?\n\nPhải chi anh đoán ra khi em ngang qua đây ngào ngạt mùi hương nước hoa\nGiày cao gót thướt tha đưa em đi qua bao nhiêu chuyện tình yêu thoáng qua", duration: "4:28" },
      { title: "04. A Tension Lover", src: BASE + "04%20TENSION_MASTER_MP3_320%20(1).mp3", lyrics: "We’ve been down this road\nAnd it’s getting old\nI don't wanna waste your time so please, listen\n\nI tested the flame\nAnd yes, I’m telling you\nWe’ve made up our minds since the last time\n\nSo don’t lay the wreck at my front door\nI know it hurts so good\n‘Cause I’ve experienced it before\n\nWhat we loved was the tension\nI let you stay the nights in my room\nBut I don’t want you to be mine\nI don’t want your attention\n\nI’m not the one to love\nYou don’t deserve to be alone\nGuess I should walk away from your life\n\nYou don’t have to stay\nI’ll find a way to fade away\nYou know it’s time that you decided\n\nWe made up our minds the last time\nSo you shouldn’t say it was my fault\nI can’t take the blame ‘cause you already knew that\n\nThe burns gonna be alright\nI know it hurts so good\n‘Cause I’ve experienced it before\n\nWhat we loved was the tension\nI let you stay the nights in my room\nBut I don’t want you to be mine\nI don’t want your attention", duration: "3:52" }
    ];

    const player = document.getElementById('audioPlayer');
    const albumArt = document.getElementById('albumArt');
    const trackList = document.getElementById('tracks');
    const lyricsDisplay = document.getElementById('lyricsDisplay');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const errorMsg = document.getElementById('errorMsg');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const customControls = document.getElementById('customControls');
    const miniPlayer = document.getElementById('miniPlayer');
    const miniArt = document.getElementById('miniArt');
    const miniTitle = document.getElementById('miniTitle');
    const miniPlayBtn = document.getElementById('miniPlayBtn');
    const miniProgressFill = document.getElementById('miniProgressFill');

    let currentTrack = 0;
    let audioContext, analyser, source, animationFrame;
    let userInteracted = false;

    // ==== Shuffle & Repeat state ====
    // repeatMode: 0 = off, 1 = repeat all album, 2 = repeat current track
    let isShuffle = false;
    let repeatMode = 0;
    let shuffleHistory = []; // để prevTrack hoạt động hợp lý khi đang shuffle

    tracks.forEach((track, index) => {
      const div = document.createElement('div');
      div.className = 'track';
      div.innerHTML = `<span>${track.title}</span><span class="track-duration">${track.duration}</span>`;
      div.onclick = () => playTrack(index);
      trackList.appendChild(div);
    });

    function toggleShuffle() {
      isShuffle = !isShuffle;
      shuffleBtn.classList.toggle('active', isShuffle);
      shuffleHistory = [currentTrack];
    }

    function toggleRepeat() {
      repeatMode = (repeatMode + 1) % 3;
      repeatBtn.classList.remove('active');
      const badge = repeatBtn.querySelector('.repeat-one-badge');
      if (badge) badge.remove();

      if (repeatMode === 1) {
        repeatBtn.classList.add('active');
      } else if (repeatMode === 2) {
        repeatBtn.classList.add('active');
        const span = document.createElement('span');
        span.className = 'repeat-one-badge';
        span.textContent = '1';
        repeatBtn.appendChild(span);
      }
    }

    function getNextIndex() {
      if (isShuffle) {
        if (tracks.length === 1) return 0;
        let next;
        do { next = Math.floor(Math.random() * tracks.length); } while (next === currentTrack);
        return next;
      }
      return (currentTrack + 1) % tracks.length;
    }

    function initVisualizer() {
      if (audioContext) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 128;
        source = audioContext.createMediaElementSource(player);
        source.connect(analyser);
        analyser.connect(audioContext.destination);
      } catch (e) {
        console.warn("Visualizer không khởi tạo được:", e);
      }
    }

    function drawVisualizer() {
      if (!analyser) return;
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteFrequencyData(dataArray);

      const accentColor = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#ff4d94';

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const barWidth = (canvas.width / bufferLength) * 2.5;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const barHeight = (dataArray[i] / 255) * canvas.height * 0.8;
        ctx.fillStyle = accentColor;
        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
        x += barWidth + 2;
      }
      animationFrame = requestAnimationFrame(drawVisualizer);
    }

    function updateMediaSession(index) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: tracks[index].title,
        artist: 'Tuan Le',
        album: 'For the Loves of My Lives',
        artwork: [
          { src: albumArt.src, sizes: '512x512', type: 'image/png' }
        ]
      });
    }

    function setupMediaSessionHandlers() {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.setActionHandler('play', () => togglePlay());
      navigator.mediaSession.setActionHandler('pause', () => togglePlay());
      navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
      navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
      navigator.mediaSession.setActionHandler('seekto', (details) => {
        if (details.seekTime !== undefined && player.duration) {
          player.currentTime = details.seekTime;
        }
      });
    }

    function playTrack(index) {
      currentTrack = index;
      if (isShuffle) shuffleHistory.push(index);
      player.src = tracks[index].src;
      errorMsg.style.display = 'none';

      albumArt.style.transform = 'scale(0.95)';
      lyricsDisplay.style.opacity = '0';

      setTimeout(() => {
        player.play().then(() => {
          playPauseBtn.textContent = '❚❚';
          miniPlayBtn.textContent = '❚❚';
          albumArt.style.transform = 'scale(1.05)';
          lyricsDisplay.style.opacity = '1';
          initVisualizer();
          drawVisualizer();
        }).catch(err => {
          console.warn("Không phát được:", err);
          if (userInteracted) errorMsg.style.display = 'block';
        });
      }, 150);

      document.querySelectorAll('.track').forEach((el, i) => el.classList.toggle('playing', i === index));
      lyricsDisplay.textContent = tracks[index].lyrics;
      miniTitle.textContent = tracks[index].title;
      updateMediaSession(index);
    }

    function togglePlay() {
      userInteracted = true;
      if (player.paused) {
        player.play().then(() => {
          playPauseBtn.textContent = '❚❚';
          miniPlayBtn.textContent = '❚❚';
          initVisualizer();
          drawVisualizer();
        }).catch(err => {
          console.warn("Không phát được:", err);
          errorMsg.style.display = 'block';
        });
      } else {
        player.pause();
        playPauseBtn.textContent = '▶';
        miniPlayBtn.textContent = '▶';
        cancelAnimationFrame(animationFrame);
      }
    }

    function nextTrack() {
      if (repeatMode === 2) { // lặp lại đúng bài hiện tại
        playTrack(currentTrack);
        return;
      }
      currentTrack = getNextIndex();
      playTrack(currentTrack);
    }

    function prevTrack() {
      if (isShuffle && shuffleHistory.length > 1) {
        shuffleHistory.pop(); // bỏ bài hiện tại
        const prev = shuffleHistory.pop();
        playTrack(prev);
        return;
      }
      currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
      playTrack(currentTrack);
    }

    player.addEventListener('error', () => {
      errorMsg.style.display = 'block';
    });

    player.addEventListener('timeupdate', () => {
      if (player.duration) {
        const pct = (player.currentTime / player.duration) * 100;
        progressBar.value = pct;
        currentTimeEl.textContent = formatTime(player.currentTime);
        durationEl.textContent = formatTime(player.duration);
        miniProgressFill.style.width = pct + '%';

        if ('mediaSession' in navigator && navigator.mediaSession.setPositionState) {
          try {
            navigator.mediaSession.setPositionState({
              duration: player.duration,
              playbackRate: player.playbackRate,
              position: player.currentTime
            });
          } catch (e) {}
        }
      }
    });

    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      player.currentTime = pos * player.duration;
    });

    player.addEventListener('ended', () => {
      // Nếu repeat "cả album" và đây là bài cuối, hoặc repeat 1 bài, hoặc còn bài tiếp theo -> nextTrack lo hết
      if (repeatMode === 0 && !isShuffle && currentTrack === tracks.length - 1) {
        // Hết album, không lặp -> dừng lại ở bài cuối
        playPauseBtn.textContent = '▶';
        miniPlayBtn.textContent = '▶';
        cancelAnimationFrame(animationFrame);
        return;
      }
      nextTrack();
    });

    volumeSlider.addEventListener('input', () => player.volume = volumeSlider.value);

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function toggleTheme() {
      const body = document.body;
      const isLight = body.getAttribute('data-theme') === 'light';
      body.setAttribute('data-theme', isLight ? 'dark' : 'light');
      document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
    }

    // ==== Màu accent tự động lấy từ ảnh album ====
    function extractAccentColor(img) {
      try {
        const sampleCanvas = document.createElement('canvas');
        const size = 50; // resize nhỏ để lấy mẫu nhanh
        sampleCanvas.width = size;
        sampleCanvas.height = size;
        const sctx = sampleCanvas.getContext('2d');
        sctx.drawImage(img, 0, 0, size, size);
        const data = sctx.getImageData(0, 0, size, size).data;

        let r = 0, g = 0, b = 0, count = 0;
        let bestSaturation = -1, bestR = 255, bestG = 77, bestB = 148;

        for (let i = 0; i < data.length; i += 4) {
          const pr = data[i], pg = data[i + 1], pb = data[i + 2], alpha = data[i + 3];
          if (alpha < 100) continue;

          const max = Math.max(pr, pg, pb), min = Math.min(pr, pg, pb);
          const lightness = (max + min) / 2;
          const sat = max === min ? 0 : (max - min) / (255 - Math.abs(2 * lightness - 255));

          // Bỏ qua các pixel quá tối hoặc quá sáng (đen/trắng) để tránh màu accent nhạt nhòa
          if (lightness > 25 && lightness < 230) {
            r += pr; g += pg; b += pb; count++;
            if (sat > bestSaturation) {
              bestSaturation = sat;
              bestR = pr; bestG = pg; bestB = pb;
            }
          }
        }

        let finalR, finalG, finalB;
        if (bestSaturation > 0.15) {
          // Ưu tiên màu có độ bão hòa cao nhất tìm được (giống Spotify)
          finalR = bestR; finalG = bestG; finalB = bestB;
        } else if (count > 0) {
          finalR = Math.round(r / count);
          finalG = Math.round(g / count);
          finalB = Math.round(b / count);
        } else {
          return; // giữ màu mặc định
        }

        document.documentElement.style.setProperty('--accent-rgb', `${finalR}, ${finalG}, ${finalB}`);
      } catch (e) {
        console.warn("Không lấy được màu chủ đạo từ ảnh album (có thể do CORS):", e);
      }
    }

    window.onload = () => {
      currentTrack = 0;
      player.src = tracks[0].src;
      lyricsDisplay.textContent = tracks[0].lyrics;
      document.querySelectorAll('.track')[0].classList.add('playing');
      playPauseBtn.textContent = '▶';
      miniTitle.textContent = tracks[0].title;
      canvas.width = 400;
      canvas.height = 70;
      shuffleHistory = [0];

      setupMediaSessionHandlers();
      updateMediaSession(0);

      if (albumArt.complete) {
        extractAccentColor(albumArt);
      } else {
        albumArt.addEventListener('load', () => extractAccentColor(albumArt));
      }
    };

    // ==== Sticky mini-player: hiện khi cuộn qua khỏi khu vực điều khiển chính ====
    window.addEventListener('scroll', () => {
      const rect = customControls.getBoundingClientRect();
      const shouldShow = rect.bottom < 0;
      miniPlayer.classList.toggle('show', shouldShow);
    });
  </script>
</body>
</html>
